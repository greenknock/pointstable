<!DOCTYPE html>
<html>
<head>
  <title>Points Table</title>

  <style>
    body {
      margin:0;
      background: radial-gradient(circle at top,#020617,#000);
      color:white;
      font-family:'Segoe UI',sans-serif;
    }

    h1 {
      text-align:center;
      margin:20px 0;
      font-size:32px;
    }

    .container {
      max-width:1100px;
      margin:auto;
      padding:20px;
    }

    .input-box {
      display:grid;
      grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
      gap:12px;
      margin-bottom:25px;
      background: rgba(255,255,255,0.04);
      padding:18px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.08);
    }

    input, select {
      padding:10px;
      border-radius:8px;
      border:none;
      background:#020617;
      color:white;
      border:1px solid rgba(255,255,255,0.08);
    }

    button {
      padding:10px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      background:#020617;
      border-radius:12px;
      overflow:hidden;
    }

    th, td {
      padding:14px;
      text-align:center;
    }

    tbody tr {
      border-bottom:1px solid rgba(255,255,255,0.05);
    }

    .top4 {
      background:rgba(34,197,94,0.08);
    }

    .team-cell {
      display:flex;
      align-items:center;
      gap:12px;
      justify-content:flex-start;
    }

    .team-logo {
      width:32px;
      height:32px;
      border-radius:50%;
      background:#000;
      padding:3px;
    }

    /* 🔥 NEW MATCH HISTORY UI */

    .card {
      background: linear-gradient(145deg,#020617,#020617);
      border:1px solid rgba(255,255,255,0.08);
      padding:16px;
      margin:14px 0;
      border-radius:14px;
      transition:0.25s;
    }

    .card:hover {
      transform:translateY(-3px);
      border:1px solid rgba(34,197,94,0.4);
    }

    .match-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }

    .team-block {
      display:flex;
      align-items:center;
      gap:10px;
      min-width:140px;
    }

    .team-block img {
      width:34px;
      height:34px;
      border-radius:50%;
      background:#000;
      padding:3px;
    }

    .score {
      font-size:15px;
      font-weight:600;
    }

    .overs {
      font-size:12px;
      color:#94a3b8;
    }

    .vs {
      font-size:12px;
      color:#64748b;
    }

    .result {
      margin-top:10px;
      font-weight:600;
      color:#22c55e;
    }

    .actions {
      margin-top:10px;
      display:flex;
      gap:8px;
    }

    .actions button {
      background:#1e293b;
    }

    h2 {
      margin-top:30px;
    }

  </style>
</head>

<body>

<div class="container">

<h1>Points Table</h1>

<div class="input-box">
  <select id="teamA"></select>
  <input id="runsA" placeholder="Runs A">
  <input id="oversA" placeholder="Overs A">
  <input id="wkA" placeholder="Wk A (0-3)">

  <select id="teamB"></select>
  <input id="runsB" placeholder="Runs B">
  <input id="oversB" placeholder="Overs B">
  <input id="wkB" placeholder="Wk B (0-3)">

  <select id="batFirst">
    <option value="A">A Bats First</option>
    <option value="B">B Bats First</option>
  </select>

  <button onclick="addMatch()">Add Match</button>
</div>

<table>
<thead>
<tr>
<th>#</th><th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th><th>NRR</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h2>Match History</h2>
<div id="history"></div>

</div>

<script>
const teams = ["CSK","MI","RCB","SRH","RR","DC","GT","LSG","KKR","PBKS"];

const teamLogos = {
  CSK:"./logos/CSK.png",
  MI:"./logos/MI.png",
  RCB:"./logos/RCB.png",
  SRH:"./logos/SRH.png",
  RR:"./logos/RR.png",
  DC:"./logos/DC.png",
  GT:"./logos/GT.png",
  LSG:"./logos/LSG.png",
  KKR:"./logos/KKR.png",
  PBKS:"./logos/PBKS.png"
};

let matches = JSON.parse(localStorage.getItem("matches")) || [];

function resetTable(){
  return teams.map(t => ({
    team:t, played:0, won:0, lost:0, points:0,
    runsFor:0, runsAgainst:0, ballsFaced:0, ballsBowled:0, nrr:0
  }));
}

function safe(x){ return (x===undefined || isNaN(x)) ? 0 : x; }

function oversToBalls(o){
  let [a,b]=(o||"").split(".");
  return (parseInt(a)||0)*6 + (parseInt(b)||0);
}

function getBalls(balls, wickets){
  if(wickets === 3) return 60;
  return balls;
}

function calcNRR(t){
  if(!t.ballsFaced || !t.ballsBowled) return 0;
  return ((t.runsFor/(t.ballsFaced/6)) - (t.runsAgainst/(t.ballsBowled/6))).toFixed(2);
}

function rebuildTable(){
  let table = resetTable();

  matches.forEach(m=>{
    let A = table.find(t=>t.team===m.teamA);
    let B = table.find(t=>t.team===m.teamB);

    let wkA = safe(m.wkA);
    let wkB = safe(m.wkB);

    let bA = getBalls(oversToBalls(m.oversA), wkA);
    let bB = getBalls(oversToBalls(m.oversB), wkB);

    A.played++; B.played++;

    A.runsFor+=m.rA; A.runsAgainst+=m.rB;
    B.runsFor+=m.rB; B.runsAgainst+=m.rA;

    A.ballsFaced+=bA; A.ballsBowled+=bB;
    B.ballsFaced+=bB; B.ballsBowled+=bA;

    if(m.rA > m.rB){ A.won++; A.points+=2; B.lost++; }
    else if(m.rB > m.rA){ B.won++; B.points+=2; A.lost++; }
  });

  table.forEach(t=>t.nrr=calcNRR(t));
  return table.sort((a,b)=> b.points-a.points || b.nrr-a.nrr);
}

function getResult(m){
  let wkA = safe(m.wkA);
  let wkB = safe(m.wkB);
  let totalWickets = 3;

  if(m.rA === m.rB) return "Match tied";

  if(m.batFirst === "A"){
    if(m.rB > m.rA){
      let w = totalWickets - wkB;
      return `${m.teamB} won by ${w} wicket${w>1?'s':''}`;
    } else {
      return `${m.teamA} won by ${m.rA - m.rB} runs`;
    }
  } else {
    if(m.rA > m.rB){
      let w = totalWickets - wkA;
      return `${m.teamA} won by ${w} wicket${w>1?'s':''}`;
    } else {
      return `${m.teamB} won by ${m.rB - m.rA} runs`;
    }
  }
}

function render(){
  let table = rebuildTable();
  let body=document.getElementById("tableBody");
  body.innerHTML="";

  table.forEach((t,i)=>{
    body.innerHTML+=`
    <tr class="${i<4?'top4':''}">
      <td>${i+1}</td>
      <td class="team-cell">
        <img src="${teamLogos[t.team]}" class="team-logo">
        ${i===0 ? "👑" : ""} ${t.team}
      </td>
      <td>${t.played}</td>
      <td>${t.won}</td>
      <td>${t.lost}</td>
      <td>${t.points}</td>
      <td>${t.nrr}</td>
    </tr>`;
  });

  renderHistory();
}

function renderHistory(){
  let div=document.getElementById("history");
  div.innerHTML="";

  matches.forEach((m,i)=>{
    let wkA = safe(m.wkA);
    let wkB = safe(m.wkB);

    div.innerHTML+=`
    <div class="card">

      <div class="match-row">

        <div class="team-block">
          <img src="${teamLogos[m.teamA]}">
          <div>
            <div>${m.teamA}</div>
            <div class="score">${m.rA}/${wkA}</div>
            <div class="overs">${m.oversA} overs</div>
          </div>
        </div>

        <div class="vs">VS</div>

        <div class="team-block" style="justify-content:flex-end; text-align:right;">
          <div>
            <div>${m.teamB}</div>
            <div class="score">${m.rB}/${wkB}</div>
            <div class="overs">${m.oversB} overs</div>
          </div>
          <img src="${teamLogos[m.teamB]}">
        </div>

      </div>

      <div class="result">${getResult(m)}</div>

      <div class="actions">
        <button onclick="editMatch(${i})">Edit</button>
        <button onclick="deleteMatch(${i})">Delete</button>
      </div>

    </div>`;
  });
}

function addMatch(){
  matches.unshift({
    teamA:teamA.value,
    teamB:teamB.value,
    rA:safe(parseInt(runsA.value)),
    rB:safe(parseInt(runsB.value)),
    wkA:safe(parseInt(wkA.value)),
    wkB:safe(parseInt(wkB.value)),
    oversA:oversA.value,
    oversB:oversB.value,
    batFirst:batFirst.value
  });

  localStorage.setItem("matches", JSON.stringify(matches));
  render();
}

function deleteMatch(i){
  matches.splice(i,1);
  localStorage.setItem("matches", JSON.stringify(matches));
  render();
}

function editMatch(i){
  let m = matches[i];

  teamA.value=m.teamA;
  teamB.value=m.teamB;
  runsA.value=m.rA;
  runsB.value=m.rB;
  wkA.value=safe(m.wkA);
  wkB.value=safe(m.wkB);
  oversA.value=m.oversA;
  oversB.value=m.oversB;
  batFirst.value=m.batFirst;

  matches.splice(i,1);
  localStorage.setItem("matches", JSON.stringify(matches));
  render();
}

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");
const runsA=document.getElementById("runsA");
const runsB=document.getElementById("runsB");
const wkA=document.getElementById("wkA");
const wkB=document.getElementById("wkB");
const oversA=document.getElementById("oversA");
const oversB=document.getElementById("oversB");
const batFirst=document.getElementById("batFirst");

teams.forEach(t=>{
  teamA.innerHTML+=`<option>${t}</option>`;
  teamB.innerHTML+=`<option>${t}</option>`;
});

render();
</script>

</body>
</html>
