<!DOCTYPE html>
<html>
<head>
  <title>Points Table</title>

  <style>
    body {
      background: linear-gradient(135deg,#020617,#0f172a);
      color:white;
      font-family:'Segoe UI',sans-serif;
      padding:20px;
    }

    .input-box {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:25px;
      background: rgba(255,255,255,0.05);
      padding:15px;
      border-radius:12px;
    }

    input, select {
      padding:10px;
      border-radius:8px;
      border:none;
      background:#0f172a;
      color:white;
    }

    button {
      padding:8px 14px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th, td {
      padding:12px;
      text-align:center;
    }

    .top4 {
      background:#14532d;
    }

    .team-cell {
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-start;
      padding-left:15px;
    }

    .team-logo {
      width:28px;
      height:28px;
      object-fit:contain;
      border-radius:50%;
      background:#020617;
      padding:2px;
    }

    .card {
      background:#1e293b;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
    }

    .result {
      color:#22c55e;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>Points Table</h1>

<div class="input-box">
  <select id="teamA"></select>
  <input id="runsA" placeholder="Runs A">
  <input id="oversA" placeholder="Overs A">
  <input id="wkA" placeholder="Wk A (0-3)">

  <select id="teamB"></select>
  <input id="runsB" placeholder="Runs B">
  <input id="oversB" placeholder="Overs B">
  <input id="wkB" placeholder="Wk B (0-3)">

  <select id="batFirst">
    <option value="A">A Bats First</option>
    <option value="B">B Bats First</option>
  </select>

  <button onclick="addMatch()">Add Match</button>
</div>

<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th><th>NRR</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h2>Match History</h2>
<div id="history"></div>

<script>
const teams = ["CSK","MI","RCB","SRH","RR","DC","GT","LSG","KKR","PBKS"];

const teamLogos = {
  CSK:"https://upload.wikimedia.org/wikipedia/en/2/2e/Chennai_Super_Kings_Logo.svg",
  MI:"https://upload.wikimedia.org/wikipedia/en/c/cd/Mumbai_Indians_Logo.svg",
  RCB:"https://upload.wikimedia.org/wikipedia/en/4/4f/Royal_Challengers_Bangalore_Logo.svg",
  SRH:"https://upload.wikimedia.org/wikipedia/en/8/81/Sunrisers_Hyderabad.svg",
  RR:"https://upload.wikimedia.org/wikipedia/en/6/60/Rajasthan_Royals_Logo.svg",
  DC:"https://upload.wikimedia.org/wikipedia/en/2/2f/Delhi_Capitals.svg",
  GT:"https://upload.wikimedia.org/wikipedia/en/0/09/Gujarat_Titans_Logo.svg",
  LSG:"https://upload.wikimedia.org/wikipedia/en/7/75/Lucknow_Super_Giants_IPL_Logo.svg",
  KKR:"https://upload.wikimedia.org/wikipedia/en/4/4c/Kolkata_Knight_Riders_Logo.svg",
  PBKS:"https://upload.wikimedia.org/wikipedia/en/d/d4/Punjab_Kings_Logo.svg"
};

let matches = JSON.parse(localStorage.getItem("matches")) || [];

function resetTable(){
  return teams.map(t => ({
    team:t, played:0, won:0, lost:0, points:0,
    runsFor:0, runsAgainst:0, ballsFaced:0, ballsBowled:0, nrr:0
  }));
}

function safe(x){ return (x===undefined || isNaN(x)) ? 0 : x; }

function oversToBalls(o){
  let [a,b]=(o||"").split(".");
  return (parseInt(a)||0)*6 + (parseInt(b)||0);
}

// 🔴 FIXED NRR LOGIC
function getBalls(balls, wickets){
  if(wickets === 3) return 60; // all out → full overs
  return balls;
}

function calcNRR(t){
  if(!t.ballsFaced || !t.ballsBowled) return 0;
  return ((t.runsFor/(t.ballsFaced/6)) - (t.runsAgainst/(t.ballsBowled/6))).toFixed(2);
}

function rebuildTable(){
  let table = resetTable();

  matches.forEach(m=>{
    let A = table.find(t=>t.team===m.teamA);
    let B = table.find(t=>t.team===m.teamB);

    let wkA = safe(m.wkA);
    let wkB = safe(m.wkB);

    let bA = getBalls(oversToBalls(m.oversA), wkA);
    let bB = getBalls(oversToBalls(m.oversB), wkB);

    A.played++; B.played++;

    A.runsFor+=m.rA; A.runsAgainst+=m.rB;
    B.runsFor+=m.rB; B.runsAgainst+=m.rA;

    A.ballsFaced+=bA; A.ballsBowled+=bB;
    B.ballsFaced+=bB; B.ballsBowled+=bA;

    if(m.rA > m.rB){ A.won++; A.points+=2; B.lost++; }
    else if(m.rB > m.rA){ B.won++; B.points+=2; A.lost++; }
  });

  table.forEach(t=>t.nrr=calcNRR(t));
  return table.sort((a,b)=> b.points-a.points || b.nrr-a.nrr);
}

function getResult(m){
  let wkA = safe(m.wkA);
  let wkB = safe(m.wkB);
  let totalWickets = 3;

  if(m.rA === m.rB) return "Match tied";

  if(m.batFirst === "A"){
    if(m.rB > m.rA){
      let w = totalWickets - wkB;
      return `${m.teamB} won by ${w} wicket${w>1?'s':''}`;
    } else {
      return `${m.teamA} won by ${m.rA - m.rB} runs`;
    }
  } else {
    if(m.rA > m.rB){
      let w = totalWickets - wkA;
      return `${m.teamA} won by ${w} wicket${w>1?'s':''}`;
    } else {
      return `${m.teamB} won by ${m.rB - m.rA} runs`;
    }
  }
}

function render(){
  let table = rebuildTable();
  let body=document.getElementById("tableBody");
  body.innerHTML="";

  table.forEach((t,i)=>{
    body.innerHTML+=`
    <tr class="${i<4?'top4':''}">
      <td class="team-cell">
        <img src="${teamLogos[t.team]}" class="team-logo"
         onerror="this.src='https://via.placeholder.com/28?text=${t.team[0]}'">
        ${i===0 ? "👑 " : ""}${t.team}
      </td>
      <td>${t.played}</td>
      <td>${t.won}</td>
      <td>${t.lost}</td>
      <td>${t.points}</td>
      <td>${t.nrr}</td>
    </tr>`;
  });

  renderHistory();
}

function renderHistory(){
  let div=document.getElementById("history");
  div.innerHTML="";

  matches.forEach((m,i)=>{
    let wkA = safe(m.wkA);
    let wkB = safe(m.wkB);

    div.innerHTML+=`
    <div class="card">
      ${m.teamA} ${m.rA}/${wkA} (${m.oversA}) vs 
      ${m.teamB} ${m.rB}/${wkB} (${m.oversB})
      <div class="result">${getResult(m)}</div>
      <button onclick="editMatch(${i})">Edit</button>
      <button onclick="deleteMatch(${i})">Delete</button>
    </div>`;
  });
}

function addMatch(){
  matches.unshift({
    teamA:teamA.value,
    teamB:teamB.value,
    rA:safe(parseInt(runsA.value)),
    rB:safe(parseInt(runsB.value)),
    wkA:safe(parseInt(wkA.value)),
    wkB:safe(parseInt(wkB.value)),
    oversA:oversA.value,
    oversB:oversB.value,
    batFirst:batFirst.value
  });

  localStorage.setItem("matches", JSON.stringify(matches));
  render();
}

function deleteMatch(i){
  matches.splice(i,1);
  localStorage.setItem("matches", JSON.stringify(matches));
  render();
}

function editMatch(i){
  let m = matches[i];

  teamA.value=m.teamA;
  teamB.value=m.teamB;
  runsA.value=m.rA;
  runsB.value=m.rB;
  wkA.value=safe(m.wkA);
  wkB.value=safe(m.wkB);
  oversA.value=m.oversA;
  oversB.value=m.oversB;
  batFirst.value=m.batFirst;

  matches.splice(i,1);
  localStorage.setItem("matches", JSON.stringify(matches));
  render();
}

const teamA=document.getElementById("teamA");
const teamB=document.getElementById("teamB");
const runsA=document.getElementById("runsA");
const runsB=document.getElementById("runsB");
const wkA=document.getElementById("wkA");
const wkB=document.getElementById("wkB");
const oversA=document.getElementById("oversA");
const oversB=document.getElementById("oversB");
const batFirst=document.getElementById("batFirst");

teams.forEach(t=>{
  teamA.innerHTML+=`<option>${t}</option>`;
  teamB.innerHTML+=`<option>${t}</option>`;
});

render();
</script>

</body>
</html>
