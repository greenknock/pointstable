<!DOCTYPE html>
<html>
<head>
  <title>Points Table</title>

  <style>
    body { background:#020617; color:white; font-family:sans-serif; padding:20px; }

    .input-box {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    input, select {
      padding:8px;
      border-radius:6px;
      border:none;
    }

    button {
      padding:8px 12px;
      background:#14532d;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    th, td {
      padding:10px;
      border-bottom:1px solid #334155;
      text-align:center;
    }

    .top4 { background:#14532d; }

    .card {
      background:#1e293b;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
    }
  </style>
</head>

<body>

<h1>Points Table</h1>

<div class="input-box">
  <select id="teamA"></select>
  <input id="runsA" placeholder="Runs A">
  <input id="oversA" placeholder="Overs A">
  <input id="wkA" placeholder="Wk A (0-3)">

  <select id="teamB"></select>
  <input id="runsB" placeholder="Runs B">
  <input id="oversB" placeholder="Overs B">
  <input id="wkB" placeholder="Wk B (0-3)">

  <select id="batFirst">
    <option value="A">A Bats First</option>
    <option value="B">B Bats First</option>
  </select>

  <button onclick="addMatch()">Add Match</button>
</div>

<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th><th>NRR</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h2>Match History</h2>
<div id="history"></div>

<script>
const teams = ["CSK","MI","RCB","SRH","RR","DC","GT","LSG","KKR","PBKS"];

let table = JSON.parse(localStorage.getItem("table")) || [];
let matches = JSON.parse(localStorage.getItem("matches")) || [];

if(!table.length){
  table = teams.map(t => ({
    team:t, played:0, won:0, lost:0, points:0,
    runsFor:0, runsAgainst:0, ballsFaced:0, ballsBowled:0, nrr:0
  }));
}

function safeWk(x){
  return (x === undefined || isNaN(x)) ? 0 : x;
}

function oversToBalls(overs){
  let [o,b] = (overs||"").split(".");
  return (parseInt(o)||0)*6 + (parseInt(b)||0);
}

function calcNRR(t){
  if(!t.ballsFaced || !t.ballsBowled) return 0;
  return ((t.runsFor/(t.ballsFaced/6)) - (t.runsAgainst/(t.ballsBowled/6))).toFixed(2);
}

function render(){
  let body = document.getElementById("tableBody");
  body.innerHTML="";

  table.sort((a,b)=> b.points-a.points || b.nrr-a.nrr);

  table.forEach((t,i)=>{
    body.innerHTML += `
    <tr class="${i<4?'top4':''}">
      <td>${t.team}</td>
      <td>${t.played}</td>
      <td>${t.won}</td>
      <td>${t.lost}</td>
      <td>${t.points}</td>
      <td>${t.nrr}</td>
    </tr>`;
  });

  renderHistory();
}

function renderHistory(){
  let div=document.getElementById("history");
  div.innerHTML="";

  matches.forEach(m=>{
    let wkA = safeWk(m.wkA);
    let wkB = safeWk(m.wkB);

    let result = "";

    if(m.rA === m.rB){
      result = "Match tied";
    }
    else if(m.batFirst === "A"){
      // A first → B chasing
      if(m.rA > m.rB){
        result = `${m.teamA} won by ${m.rA - m.rB} runs`;
      } else {
        let w = 3 - wkB;
        result = `${m.teamB} won by ${w} wicket${w>1?'s':''}`;
      }
    }
    else {
      // B first → A chasing
      if(m.rB > m.rA){
        result = `${m.teamB} won by ${m.rB - m.rA} runs`;
      } else {
        let w = 3 - wkA;
        result = `${m.teamA} won by ${w} wicket${w>1?'s':''}`;
      }
    }

    div.innerHTML+=`
    <div class="card">
      ${m.teamA} ${m.rA}/${wkA} (${m.oversA||""}) vs 
      ${m.teamB} ${m.rB}/${wkB} (${m.oversB||""})
      <br>${result}
    </div>`;
  });
}

function addMatch(){
  let teamA=teamAEl.value;
  let teamB=teamBEl.value;

  let rA=parseInt(runsA.value);
  let rB=parseInt(runsB.value);

  let wA=safeWk(parseInt(wkA.value));
  let wB=safeWk(parseInt(wkB.value));

  let bA=oversToBalls(oversA.value);
  let bB=oversToBalls(oversB.value);

  let batFirst=document.getElementById("batFirst").value;

  let A=table.find(t=>t.team===teamA);
  let B=table.find(t=>t.team===teamB);

  A.played++; B.played++;

  A.runsFor+=rA; A.runsAgainst+=rB;
  B.runsFor+=rB; B.runsAgainst+=rA;

  A.ballsFaced+=bA; A.ballsBowled+=bB;
  B.ballsFaced+=bB; B.ballsBowled+=bA;

  if(rA>rB){ A.won++; A.points+=2; B.lost++; }
  else if(rB>rA){ B.won++; B.points+=2; A.lost++; }

  table.forEach(t=>t.nrr=calcNRR(t));

  matches.unshift({
    teamA,teamB,rA,rB,
    wkA:wA,wkB:wB,
    oversA:oversA.value,
    oversB:oversB.value,
    batFirst
  });

  localStorage.setItem("table", JSON.stringify(table));
  localStorage.setItem("matches", JSON.stringify(matches));

  render();
}

const teamAEl=document.getElementById("teamA");
const teamBEl=document.getElementById("teamB");
const runsA=document.getElementById("runsA");
const runsB=document.getElementById("runsB");
const wkA=document.getElementById("wkA");
const wkB=document.getElementById("wkB");
const oversA=document.getElementById("oversA");
const oversB=document.getElementById("oversB");

teams.forEach(t=>{
  teamAEl.innerHTML+=`<option>${t}</option>`;
  teamBEl.innerHTML+=`<option>${t}</option>`;
});

const params = new URLSearchParams(window.location.search);
const tA = params.get("teamA");
const tB = params.get("teamB");

if(tA && tB){
  teamAEl.value = tA;
  teamBEl.value = tB;
}

render();
</script>

</body>
</html>
