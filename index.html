<!DOCTYPE html>
<html>
<head>
  <title>TPL</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body {
      height:100vh;
      background:#020617;
      color:white;
      overflow:hidden;
    }

    .bg {
      position:absolute;
      width:100%;
      height:100%;
      background: radial-gradient(circle at 20% 30%, #22c55e22, transparent 40%),
                  radial-gradient(circle at 80% 70%, #3b82f622, transparent 40%);
      z-index:0;
    }

    .container {
      position:relative;
      z-index:1;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:60px;
    }

    .left {
      max-width:500px;
      animation:fadeLeft 1s ease;
    }

    .title {
      font-size:80px;
      font-weight:700;
      background:linear-gradient(90deg,#22c55e,#4ade80);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle {
      margin:20px 0;
      opacity:0.7;
      font-size:18px;
    }

    .buttons {
      display:flex;
      gap:20px;
      margin-top:30px;
      flex-wrap:wrap;
    }

    .btn {
      padding:16px 32px;
      border:none;
      border-radius:14px;
      font-size:16px;
      cursor:pointer;
      color:white;
      transition:0.3s;
    }

    .green {
      background:linear-gradient(135deg,#16a34a,#22c55e);
    }

    .blue {
      background:linear-gradient(135deg,#2563eb,#3b82f6);
    }

    .orange {
      background:linear-gradient(135deg,#ea580c,#f97316);
    }
    
    .btn:hover {
      transform:translateY(-5px) scale(1.05);
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }

    .right {
      position:relative;
      animation:fadeRight 1s ease;
    }

    .image {
      width:420px;
      border-radius:20px;
      box-shadow:0 20px 60px rgba(0,0,0,0.7);
      transition:0.4s;
    }

    .image:hover {
      transform:scale(1.05) rotate(-2deg);
    }

    .ball {
      position:absolute;
      width:30px;
      top:10%;
      left:-40px;
      animation:float 3s infinite ease-in-out;
    }

    @keyframes fadeLeft {
      from {opacity:0; transform:translateX(-40px);}
      to {opacity:1; transform:translateX(0);}
    }

    @keyframes fadeRight {
      from {opacity:0; transform:translateX(40px);}
      to {opacity:1; transform:translateX(0);}
    }

    @keyframes float {
      0% {transform:translateY(0);}
      50% {transform:translateY(-20px);}
      100% {transform:translateY(0);}
    }

    @media(max-width:900px){
      .container {
        flex-direction:column;
        text-align:center;
        justify-content:center;
      }

      .right {
        margin-top:30px;
      }

      .image {
        width:260px;
      }

      .title {
        font-size:50px;
      }
    }

  </style>
</head>

<body>

<div class="bg"></div>

<div class="container">

  <div class="left">
    <div class="title">TPL</div>
    <div class="subtitle">Track • Play • Lead your tournament like a pro.</div>

    <div class="buttons">
      <button class="btn green" onclick="location.href='points.html'">
        Points Table
      </button>

      <button class="btn blue" onclick="location.href='schedule.html'">
        Match Schedule
      </button>

      <button class="btn orange" onclick="location.href='mvp.html'">
        MVP List
      </button>

      <!-- NEW BUTTON -->
      <button class="btn orange" onclick="location.href='TeamGraph.html'">
        Graph
      </button>
    </div>
  </div>

  <div class="right">
    <img class="image" src="https://images.unsplash.com/photo-1593341646782-e0b495cff86d">
    <img class="ball" src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Cricket_ball.svg">
  </div>

</div>

</body>
</html>
