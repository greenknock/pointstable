<!DOCTYPE html>
<html>
<head>
  <title>Points Table</title>
  <style>
    body { background:#0f172a; color:white; font-family:sans-serif; padding:20px; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:10px; text-align:center; border-bottom:1px solid #334155; }
    .top4 { background:#14532d; }
    .input-box { margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; }
    .card { background:#1e293b; padding:10px; margin-bottom:10px; border-radius:8px; }
    button { cursor:pointer; }
    img { vertical-align:middle; }
  </style>
</head>
<body>

<h1>Points Table</h1>

<div class="input-box">
  <select id="teamA"></select>
  <input id="scoreA" placeholder="Runs A">
  <input id="oversA" placeholder="Overs A (e.g. 9.3)">

  <select id="teamB"></select>
  <input id="scoreB" placeholder="Runs B">
  <input id="oversB" placeholder="Overs B">

  <select id="batFirst">
    <option value="A">Team A Bats First</option>
    <option value="B">Team B Bats First</option>
  </select>

  <button onclick="addMatch()">Add Match</button>
</div>

<table>
<thead>
<tr>
<th>Team</th><th>P</th><th>W</th><th>L</th><th>Pts</th><th>NRR</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<h2>Match History</h2>
<div id="history"></div>

<script>
const teams = ["CSK","MI","RCB","SRH","RR","DC","GT","LSG","KKR","PBKS"];

// 🔴 STABLE LOGO LINKS
const logos = {
  CSK:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/csk.png",
  MI:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/mi.png",
  RCB:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/rcb.png",
  SRH:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/srh.png",
  RR:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/rr.png",
  DC:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/dc.png",
  GT:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/gt.png",
  LSG:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/lsg.png",
  KKR:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/kkr.png",
  PBKS:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/pbks.png"
};

// 🔴 CLEAN INIT (avoid corrupted data)
let table = JSON.parse(localStorage.getItem("table"));
let matches = JSON.parse(localStorage.getItem("matches"));

if(!table || !Array.isArray(table)) {
  table = teams.map(t => ({
    team:t, played:0, won:0, lost:0, points:0,
    runsFor:0, runsAgainst:0, ballsFaced:0, ballsBowled:0, nrr:0
  }));
}

if(!matches || !Array.isArray(matches)) {
  matches = [];
}

const MAX_BALLS = 60;

function oversToBalls(overs){
  let [o,b] = (overs || "").split(".");
  o = parseInt(o)||0;
  b = parseInt(b)||0;
  if(b>=6) return null;
  return o*6 + b;
}

function calcNRR(t){
  if(t.ballsFaced===0 || t.ballsBowled===0) return 0;
  return ((t.runsFor/(t.ballsFaced/6)) - (t.runsAgainst/(t.ballsBowled/6))).toFixed(2);
}

function render(){
  const body = document.getElementById("tableBody");
  body.innerHTML="";

  table.sort((a,b)=> b.points-a.points || b.nrr-a.nrr);

  table.forEach((t,i)=>{
    body.innerHTML += `
    <tr class="${i<4?'top4':''}">
      <td><img src="${logos[t.team]}" width="25" onerror="this.style.display='none'"> ${t.team}</td>
      <td>${t.played}</td>
      <td>${t.won}</td>
      <td>${t.lost}</td>
      <td>${t.points}</td>
      <td>${t.nrr}</td>
    </tr>`;
  });

  localStorage.setItem("table", JSON.stringify(table));
  renderHistory();
}

function renderHistory(){
  const div = document.getElementById("history");
  div.innerHTML = "";

  if(matches.length === 0){
    div.innerHTML = "<p>No matches yet</p>";
    return;
  }

  matches.forEach((m,index)=>{
    const batFirstText = m.batFirst === "A" ? m.teamA : m.teamB;

    div.innerHTML += `
      <div class="card">
        <b>${m.teamA}</b> ${m.rA}/${m.oversA} vs 
        <b>${m.teamB}</b> ${m.rB}/${m.oversB}
        <br>
        <small>${batFirstText} batted first</small>
        <br><br>
        <button onclick="deleteMatch(${index})">Delete</button>
      </div>
    `;
  });
}

function addMatch(){
  const teamA = document.getElementById("teamA").value;
  const teamB = document.getElementById("teamB").value;
  const batFirst = document.getElementById("batFirst").value;

  const rA = parseInt(document.getElementById("scoreA").value);
  const rB = parseInt(document.getElementById("scoreB").value);

  let bA = oversToBalls(document.getElementById("oversA").value);
  let bB = oversToBalls(document.getElementById("oversB").value);

  if(teamA===teamB) return alert("Same team");
  if(!rA || !rB || bA==null || bB==null) return alert("Invalid input");
  if(bA > MAX_BALLS || bB > MAX_BALLS) return alert("Max 10 overs");

  let A = table.find(t=>t.team===teamA);
  let B = table.find(t=>t.team===teamB);

  A.played++; B.played++;

  if (batFirst === "A" && rB < rA) bB = MAX_BALLS;
  if (batFirst === "B" && rA < rB) bA = MAX_BALLS;

  A.runsFor+=rA; A.runsAgainst+=rB;
  B.runsFor+=rB; B.runsAgainst+=rA;

  A.ballsFaced+=bA; A.ballsBowled+=bB;
  B.ballsFaced+=bB; B.ballsBowled+=bA;

  if(rA>rB){ A.won++; A.points+=2; B.lost++; }
  else { B.won++; B.points+=2; A.lost++; }

  table.forEach(t=> t.nrr = calcNRR(t));

  matches.unshift({
    teamA, teamB, rA, rB,
    oversA: document.getElementById("oversA").value,
    oversB: document.getElementById("oversB").value,
    batFirst
  });

  localStorage.setItem("matches", JSON.stringify(matches));

  render();
}

function deleteMatch(index){
  matches.splice(index,1);

  // reset table
  table = teams.map(t => ({
    team:t, played:0, won:0, lost:0, points:0,
    runsFor:0, runsAgainst:0, ballsFaced:0, ballsBowled:0, nrr:0
  }));

  // replay matches
  matches.slice().reverse().forEach(m => {
    let bA = oversToBalls(m.oversA);
    let bB = oversToBalls(m.oversB);

    let A = table.find(t=>t.team===m.teamA);
    let B = table.find(t=>t.team===m.teamB);

    A.played++; B.played++;

    if (m.batFirst === "A" && m.rB < m.rA) bB = MAX_BALLS;
    if (m.batFirst === "B" && m.rA < m.rB) bA = MAX_BALLS;

    A.runsFor+=m.rA; A.runsAgainst+=m.rB;
    B.runsFor+=m.rB; B.runsAgainst+=m.rA;

    A.ballsFaced+=bA; A.ballsBowled+=bB;
    B.ballsFaced+=bB; B.ballsBowled+=bA;

    if(m.rA>m.rB){ A.won++; A.points+=2; B.lost++; }
    else { B.won++; B.points+=2; A.lost++; }

    table.forEach(t=> t.nrr = calcNRR(t));
  });

  localStorage.setItem("matches", JSON.stringify(matches));
  render();
}

// dropdown
teams.forEach(t=>{
  document.getElementById("teamA").innerHTML += `<option>${t}</option>`;
  document.getElementById("teamB").innerHTML += `<option>${t}</option>`;
});

render();
</script>

</body>
</html>
