<!DOCTYPE html>
<html>
<head>
  <title>TPL</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body {
      height:100vh;
      background: radial-gradient(circle at top, #020617, #020617 40%, #0f172a);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      overflow:hidden;
    }

    /* BACKGROUND GLOW */
    .glow {
      position:absolute;
      width:400px;
      height:400px;
      background:radial-gradient(circle, #22c55e33, transparent);
      top:-100px;
      left:-100px;
      filter:blur(100px);
    }

    /* MAIN CARD */
    .container {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;
      padding:50px;
      text-align:center;
      box-shadow:0 0 40px rgba(0,0,0,0.5);
      animation:fadeUp 1s ease;
    }

    /* TITLE */
    .title {
      font-size:64px;
      font-weight:700;
      letter-spacing:5px;
      background:linear-gradient(90deg,#22c55e,#4ade80,#86efac);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      margin-bottom:10px;
    }

    .subtitle {
      opacity:0.7;
      margin-bottom:30px;
    }

    /* IMAGE */
    .cover-img {
      width:220px;
      margin-bottom:30px;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      transition:0.4s;
    }

    .cover-img:hover {
      transform:scale(1.05) rotate(-2deg);
    }

    /* BUTTONS */
    .buttons {
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .btn {
      padding:14px 28px;
      border:none;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
      color:white;
      position:relative;
      overflow:hidden;
      transition:0.3s;
    }

    /* GRADIENT BUTTONS */
    .btn-green {
      background:linear-gradient(135deg,#16a34a,#22c55e);
    }

    .btn-blue {
      background:linear-gradient(135deg,#2563eb,#3b82f6);
    }

    .btn:hover {
      transform:translateY(-5px) scale(1.05);
      box-shadow:0 10px 25px rgba(0,0,0,0.5);
    }

    /* BUTTON GLOW EFFECT */
    .btn::after {
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:-100%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,0.4),transparent);
      transition:0.5s;
    }

    .btn:hover::after {
      left:100%;
    }

    /* ANIMATION */
    @keyframes fadeUp {
      from {opacity:0; transform:translateY(40px);}
      to {opacity:1; transform:translateY(0);}
    }

    /* MOBILE */
    @media(max-width:600px){
      .container { padding:30px; }
      .title { font-size:42px; }
      .cover-img { width:160px; }
    }

  </style>
</head>

<body>

<div class="glow"></div>

<div class="container">

  <div class="title">TPL</div>
  <div class="subtitle">Track • Play • Lead</div>

  <!-- COVER DRIVE IMAGE -->
  <img class="cover-img" src="https://images.unsplash.com/photo-1593341646782-e0b495cff86d" alt="cricket">

  <div class="buttons">
    <button class="btn btn-green" onclick="location.href='points.html'">
      Points Table
    </button>

    <button class="btn btn-blue" onclick="location.href='schedule.html'">
      Match Schedule
    </button>
  </div>

</div>

</body>
</html>
