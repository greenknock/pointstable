<!DOCTYPE html>
<html>
<head>
<title>Match Schedule</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:sans-serif;
  padding:20px;
}

h1,h2{margin:20px 0;}

.match{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1e293b;
  padding:12px 20px;
  border-radius:12px;
  margin:10px 0;
  cursor:pointer;
  transition:0.3s;
}

.match:hover{background:#334155;}

.team{display:flex;align-items:center;gap:10px;}
.team img{width:30px;}

.center{opacity:0.6;}

.winner-screen{
  text-align:center;
  margin-top:100px;
  font-size:40px;
}

.winner-screen img{
  width:120px;
  margin-top:20px;
}
</style>
</head>

<body>

<h1 id="title">Match Schedule</h1>
<div id="container"></div>

<script>

const logos = {
CSK:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/csk.png",
MI:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/mi.png",
RCB:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/rcb.png",
SRH:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/srh.png",
RR:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/rr.png",
DC:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/dc.png",
GT:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/gt.png",
LSG:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/lsg.png",
KKR:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/kkr.png",
PBKS:"https://cdn.jsdelivr.net/gh/iamshaunjp/web-assets@master/ipl/pbks.png"
};

let matches = JSON.parse(localStorage.getItem("matches")) || [];
let playoffs = JSON.parse(localStorage.getItem("playoffs")) || {};

// ---------- POINTS TABLE ----------
const teams = ["CSK","MI","RCB","SRH","RR","DC","GT","LSG","KKR","PBKS"];

function resetTable(){
  return teams.map(t=>({team:t,pts:0,nrr:0,rf:0,ra:0,bf:0,bb:0}));
}

function oversToBalls(o){
  let [a,b]=(o||"").split(".");
  return (parseInt(a)||0)*6+(parseInt(b)||0);
}

function rebuild(){
  let table=resetTable();

  matches.forEach(m=>{
    let A=table.find(t=>t.team===m.teamA);
    let B=table.find(t=>t.team===m.teamB);

    let bA=oversToBalls(m.oversA);
    let bB=oversToBalls(m.oversB);

    A.rf+=m.rA; A.ra+=m.rB; A.bf+=bA; A.bb+=bB;
    B.rf+=m.rB; B.ra+=m.rA; B.bf+=bB; B.bb+=bA;

    if(m.rA>m.rB){A.pts+=2;}
    else if(m.rB>m.rA){B.pts+=2;}
  });

  table.forEach(t=>{
    t.nrr=((t.rf/(t.bf/6))-(t.ra/(t.bb/6)))||0;
  });

  return table.sort((a,b)=>b.pts-a.pts||b.nrr-a.nrr);
}

// ---------- CHECK LEAGUE DONE ----------
const TOTAL_MATCHES = 50;

if(matches.length < TOTAL_MATCHES){
  document.getElementById("title").innerText = "League Stage Ongoing";
  document.getElementById("container").innerHTML = "Finish all matches first";
}

// ---------- PLAYOFFS ----------
else{

  let table = rebuild();
  let top4 = table.slice(0,4).map(t=>t.team);

  if(!playoffs.q1){
    playoffs.q1 = {A:top4[0], B:top4[1]};
    playoffs.elim = {A:top4[2], B:top4[3]};
    localStorage.setItem("playoffs",JSON.stringify(playoffs));
  }

  renderPlayoffs();
}

function renderMatch(title, obj, key){
  if(!obj) return "";

  return `
    <h2>${title}</h2>
    <div class="match">
      <div class="team" onclick="win('${key}','A')">
        <img src="${logos[obj.A]}">${obj.A}
      </div>

      <div class="center">VS</div>

      <div class="team" onclick="win('${key}','B')">
        ${obj.B}<img src="${logos[obj.B]}">
      </div>
    </div>
  `;
}

function renderPlayoffs(){
  let c = document.getElementById("container");

  if(playoffs.finalWinner){
    c.innerHTML = `
      <div class="winner-screen">
        🏆 WINNER 🏆 <br>
        ${playoffs.finalWinner}
        <br>
        <img src="${logos[playoffs.finalWinner]}">
      </div>
    `;
    return;
  }

  c.innerHTML = `
    ${renderMatch("Qualifier 1", playoffs.q1, "q1")}
    ${renderMatch("Eliminator", playoffs.elim, "elim")}
    ${playoffs.q2 ? renderMatch("Qualifier 2", playoffs.q2, "q2") : ""}
    ${playoffs.final ? renderMatch("Final", playoffs.final, "final") : ""}
  `;
}

function win(stage, side){

  let winner = playoffs[stage][side];
  let loser = playoffs[stage][side==="A"?"B":"A"];

  if(stage==="q1"){
    playoffs.final = {A:winner};
    playoffs.q2 = {B:loser};
  }

  else if(stage==="elim"){
    playoffs.q2.A = winner;
  }

  else if(stage==="q2"){
    playoffs.final.B = winner;
  }

  else if(stage==="final"){
    playoffs.finalWinner = winner;
  }

  localStorage.setItem("playoffs",JSON.stringify(playoffs));
  renderPlayoffs();
}

</script>

</body>
</html>
