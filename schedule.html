<!DOCTYPE html>
<html>
<head>
  <title>Schedule</title>
  <style>
    body { background:#020617; color:white; font-family:sans-serif; padding:20px; }
    .match { padding:10px; margin:10px 0; background:#1e293b; border-radius:10px; cursor:pointer; }
    .done { background:#052e1f; border:1px solid #22c55e; }
  </style>
</head>
<body>

<h1>Schedule</h1>

<script>
let played = JSON.parse(localStorage.getItem("matches")) || [];

function getCount(a,b){
  return played.filter(m =>
    (m.teamA===a && m.teamB===b) ||
    (m.teamA===b && m.teamB===a)
  ).length;
}

const schedule = [
["WEEK 1",["RCB","MI"],["PBKS","LSG"]],
["WEEK 6",["MI","RCB"],["LSG","PBKS"]]
];

schedule.forEach(week=>{
  let h=document.createElement("h2");
  h.innerText=week[0];
  document.body.appendChild(h);

  let weekNum=parseInt(week[0].split(" ")[1]);

  week.slice(1).forEach(m=>{
    let count=getCount(m[0],m[1]);

    let done = weekNum<=5 ? count>=1 : count>=2;

    let div=document.createElement("div");
    div.className="match "+(done?"done":"");

    div.innerText = `${m[0]} vs ${m[1]} ${done?"✔":""}`;

    div.onclick=()=>{
      location.href=`points.html?teamA=${m[0]}&teamB=${m[1]}`;
    };

    document.body.appendChild(div);
  });
});
</script>

</body>
</html>
