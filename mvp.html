<!DOCTYPE html>
<html>
<head>
  <title>MVP List</title>

  <style>
    body {
      margin:0;
      background: radial-gradient(circle at top,#0f172a,#020617);
      color:white;
      font-family:'Segoe UI',sans-serif;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:32px;
      letter-spacing:1px;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .input-box {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:30px;
      background: rgba(255,255,255,0.04);
      padding:18px;
      border-radius:16px;
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    input, select {
      padding:10px;
      border-radius:10px;
      border:none;
      background:#020617;
      color:white;
      outline:none;
      border:1px solid rgba(255,255,255,0.08);
    }

    input:focus, select:focus {
      border:1px solid #22c55e;
    }

    button {
      padding:10px 16px;
      background:#22c55e;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    button:hover {
      background:#16a34a;
      transform:scale(1.05);
    }

    .delete-btn {
      background:#1e293b;
      margin-top:10px;
    }

    .delete-btn:hover {
      background:#ef4444;
    }

    .card {
      background: linear-gradient(145deg,#0f172a,#1e293b);
      padding:18px;
      margin:14px 0;
      border-radius:16px;
      transition: all 0.3s ease;
      position:relative;
      border:1px solid rgba(255,255,255,0.05);
    }

    .card:hover{
      transform:translateY(-4px) scale(1.01);
      box-shadow:0 15px 40px rgba(0,0,0,0.6);
    }

    .top {
      font-weight:bold;
      font-size:18px;
    }

    .gold{ color:#facc15; }
    .silver{ color:#cbd5f5; }
    .bronze{ color:#fb923c; }

    .stats{
      margin-top:10px;
      font-size:14px;
      color:#cbd5f5;
    }

    .points{
      font-weight:bold;
      margin-top:8px;
      font-size:15px;
    }

    .bar{
      height:6px;
      border-radius:6px;
      margin-top:12px;
      background:#020617;
      overflow:hidden;
    }

    .fill{
      height:100%;
      background: linear-gradient(90deg,#22c55e,#4ade80,#3b82f6);
      width:0%;
      transition:width 0.6s ease;
    }

    .up {
      animation: glowUp 0.6s;
    }

    .down {
      animation: glowDown 0.6s;
    }

    @keyframes glowUp {
      0% { box-shadow:0 0 0px #22c55e; }
      50% { box-shadow:0 0 25px #22c55e; }
      100% { box-shadow:0 0 0px #22c55e; }
    }

    @keyframes glowDown {
      0% { box-shadow:0 0 0px #ef4444; }
      50% { box-shadow:0 0 25px #ef4444; }
      100% { box-shadow:0 0 0px #ef4444; }
    }

  </style>
</head>

<body>

<div class="container">

<h1>🏏 MVP LIST</h1>

<div class="input-box">
  <select id="player"></select>
  <input id="runs" placeholder="Runs">
  <input id="sr" placeholder="Strike Rate">
  <button onclick="addPlayer()">Add Player</button>
  <button onclick="resetMVP()">Reset</button>
</div>

<div id="mvpList"></div>

</div>

<script>

// PLAYERS (added David Miller)
const players = [
  "Shimron Hetmyer","Yashasvi Jaiswal","Vaibhav Sooryavanshi",
  "Manish Pandey","Cameron Green","Finn Allen","Mitchell Marsh",
  "Ayush Badoni","Aiden Markram","Ryan Rickelton","Hardik Pandya",
  "Rohit Sharma","Glenn Phillips","Jos Buttler","Tristan Stubbs",
  "Nitish Rana","KL Rahul","Travis Head","Abhishek Sharma",
  "Ishan Kishan","Shubman Gill","Marco Jansen","Marcus Stoinis",
  "Shreyas Iyer","Rajat Patidar","Phil Salt","MS Dhoni",
  "Virat Kohli","Ruturaj Gaikwad","Sanju Samson",
  "David Miller"
];

const playerSelect = document.getElementById("player");
players.forEach(p=> playerSelect.innerHTML += `<option>${p}</option>`);

let data = JSON.parse(localStorage.getItem("mvpData")) || {};
let prevRanks = {};

function calculatePoints(runs, sr){
  let points = runs;

  if(runs === 0) points -= 1;

  if(sr === 0) points -= 3;
  else if(sr < 100) points -= 2;
  else if(sr >= 300) points += 5;
  else if(sr >= 200) points += 3;
  else if(sr >= 100) points += 1;

  return points;
}

function addPlayer(){
  let name = playerSelect.value;
  let runs = parseInt(document.getElementById("runs").value);
  let sr = parseFloat(document.getElementById("sr").value);

  if(!runs && runs !== 0 || !sr && sr !== 0){
    alert("Enter runs and strike rate");
    return;
  }

  let matchPoints = calculatePoints(runs, sr);

  if(data[name]){
    data[name].matches += 1;
    data[name].runs += runs;
    data[name].totalSR += sr;
    data[name].points += matchPoints;
  } else {
    data[name] = {
      matches: 1,
      runs: runs,
      totalSR: sr,
      points: matchPoints
    };
  }

  localStorage.setItem("mvpData", JSON.stringify(data));
  render();
}

function deletePlayer(name){
  delete data[name];
  localStorage.setItem("mvpData", JSON.stringify(data));
  render();
}

function render(){
  let div = document.getElementById("mvpList");
  div.innerHTML = "";

  let arr = [];

  for(let name in data){
    let p = data[name];
    let avgSR = p.totalSR / p.matches;

    arr.push({
      name,
      matches: p.matches,
      runs: p.runs,
      sr: avgSR.toFixed(1),
      pts: p.points
    });
  }

  arr.sort((a,b)=> b.pts - a.pts);

  let maxPoints = arr.length ? arr[0].pts : 1;

  arr.forEach((p,i)=>{

    let medal = i===0 ? "🥇" : i===1 ? "🥈" : i===2 ? "🥉" : "";
    let medalClass = i===0 ? "gold" : i===1 ? "silver" : i===2 ? "bronze" : "";

    let width = (p.pts / maxPoints) * 100;

    let animationClass = "";
    if(prevRanks[p.name] !== undefined){
      if(i < prevRanks[p.name]) animationClass = "up";
      else if(i > prevRanks[p.name]) animationClass = "down";
    }

    prevRanks[p.name] = i;

    div.innerHTML += `
    <div class="card ${animationClass}">
      <div class="top ${medalClass}">
        ${i+1}. ${medal} ${p.name}
      </div>

      <div class="stats">
        Matches: ${p.matches} | Runs: ${p.runs}<br>
        Avg SR: ${p.sr}
      </div>

      <div class="points">
        Points: ${p.pts}
      </div>

      <div class="bar">
        <div class="fill" style="width:${width}%"></div>
      </div>

      <button class="delete-btn" onclick="deletePlayer('${p.name}')">
        Delete
      </button>
    </div>`;
  });
}

function resetMVP(){
  data = {};
  prevRanks = {};
  localStorage.removeItem("mvpData");
  render();
}

render();

</script>

</body>
</html>
