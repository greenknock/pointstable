<!DOCTYPE html>
<html>
<head>
  <title>MVP List</title>

  <style>
    body {
      margin:0;
      background: radial-gradient(circle at top,#0f172a,#020617);
      color:white;
      font-family:'Segoe UI',sans-serif;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      letter-spacing:1px;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:20px;
    }

    .input-box {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:25px;
      background: rgba(255,255,255,0.05);
      padding:15px;
      border-radius:14px;
      backdrop-filter: blur(10px);
      box-shadow:0 0 20px rgba(0,0,0,0.3);
    }

    input, select {
      padding:10px;
      border-radius:10px;
      border:none;
      background:#020617;
      color:white;
      outline:none;
      transition:0.2s;
    }

    input:focus, select:focus{
      box-shadow:0 0 0 2px #22c55e;
    }

    button {
      padding:8px 14px;
      background:#22c55e;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.05);
      background:#16a34a;
    }

    .delete-btn {
      background:#ef4444;
      margin-top:8px;
    }

    .delete-btn:hover{
      background:#dc2626;
    }

    .card {
      background: linear-gradient(145deg,#0f172a,#1e293b);
      padding:16px;
      margin:12px 0;
      border-radius:14px;
      box-shadow:0 6px 20px rgba(0,0,0,0.4);
      transition:0.3s;
      position:relative;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-4px) scale(1.01);
    }

    .top {
      font-weight:bold;
      font-size:18px;
    }

    .gold{ color:#facc15; }
    .silver{ color:#cbd5f5; }
    .bronze{ color:#fb923c; }

    .stats{
      margin-top:8px;
      font-size:14px;
      opacity:0.9;
    }

    .points{
      font-size:16px;
      font-weight:bold;
      margin-top:5px;
    }

    /* Progress bar */
    .bar{
      height:6px;
      border-radius:6px;
      margin-top:10px;
      background:#020617;
      overflow:hidden;
    }

    .fill{
      height:100%;
      background: linear-gradient(90deg,#22c55e,#4ade80);
      width:0%;
      transition:width 0.6s ease;
    }

    /* animation on load */
    .card{
      animation:fadeUp 0.4s ease;
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

<div class="container">

<h1>🏏 MVP LIST</h1>

<div class="input-box">
  <select id="player"></select>
  <input id="runs" placeholder="Runs">
  <input id="sr" placeholder="Strike Rate">
  <button onclick="addPlayer()">Add Player</button>
  <button onclick="resetMVP()">Reset</button>
</div>

<div id="mvpList"></div>

</div>

<script>

// SAME LOGIC

const players = [
  "Shimron Hetmyer","Yashasvi Jaiswal","Vaibhav Sooryavanshi",
  "Manish Pandey","Cameron Green","Finn Allen","Mitchell Marsh",
  "Ayush Badoni","Aiden Markram","Ryan Rickelton","Hardik Pandya",
  "Rohit Sharma","Glenn Phillips","Jos Buttler","Tristan Stubbs",
  "Nitish Rana","KL Rahul","Travis Head","Abhishek Sharma",
  "Ishan Kishan","Shubman Gill","Marco Jansen","Marcus Stoinis",
  "Shreyas Iyer","Rajat Patidar","Phil Salt","MS Dhoni",
  "Virat Kohli","Ruturaj Gaikwad","Sanju Samson"
];

const playerSelect = document.getElementById("player");

players.forEach(p=>{
  playerSelect.innerHTML += `<option>${p}</option>`;
});

let data = JSON.parse(localStorage.getItem("mvpData")) || {};

function calculatePoints(runs, sr){
  let points = runs;

  if(runs === 0) points -= 1;

  if(sr === 0) points -= 3;
  else if(sr < 100) points -= 2;
  else if(sr >= 300) points += 5;
  else if(sr >= 200) points += 3;
  else if(sr >= 100) points += 1;

  return points;
}

function addPlayer(){
  let name = playerSelect.value;
  let runs = parseInt(document.getElementById("runs").value);
  let sr = parseFloat(document.getElementById("sr").value);

  if(!runs && runs !== 0 || !sr && sr !== 0){
    alert("Enter runs and strike rate");
    return;
  }

  let matchPoints = calculatePoints(runs, sr);

  if(data[name]){
    data[name].matches += 1;
    data[name].runs += runs;
    data[name].totalSR += sr;
    data[name].points += matchPoints;
  } else {
    data[name] = {
      matches: 1,
      runs: runs,
      totalSR: sr,
      points: matchPoints
    };
  }

  saveData();
  render();
}

function saveData(){
  localStorage.setItem("mvpData", JSON.stringify(data));
}

function deletePlayer(name){
  delete data[name];
  saveData();
  render();
}

function render(){
  let div = document.getElementById("mvpList");
  div.innerHTML = "";

  let arr = [];

  for(let name in data){
    let p = data[name];
    let avgSR = p.totalSR / p.matches;

    arr.push({
      name,
      matches: p.matches,
      runs: p.runs,
      sr: avgSR.toFixed(1),
      pts: p.points
    });
  }

  arr.sort((a,b)=> b.pts - a.pts);

  let maxPoints = arr.length ? arr[0].pts : 1;

  arr.forEach((p,i)=>{

    let medalClass = "";
    let medal = "";

    if(i===0){ medal="🥇"; medalClass="gold"; }
    else if(i===1){ medal="🥈"; medalClass="silver"; }
    else if(i===2){ medal="🥉"; medalClass="bronze"; }

    let width = (p.pts / maxPoints) * 100;

    div.innerHTML += `
    <div class="card">
      <div class="top ${medalClass}">
        ${i+1}. ${medal} ${p.name}
      </div>

      <div class="stats">
        Matches: ${p.matches} | Runs: ${p.runs}<br>
        Avg SR: ${p.sr}
      </div>

      <div class="points">
        Points: ${p.pts}
      </div>

      <div class="bar">
        <div class="fill" style="width:${width}%"></div>
      </div>

      <button class="delete-btn" onclick="deletePlayer('${p.name}')">
        Delete
      </button>
    </div>`;
  });
}

function resetMVP(){
  data = {};
  localStorage.removeItem("mvpData");
  render();
}

render();

</script>

</body>
</html>
