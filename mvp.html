<!DOCTYPE html>
<html>
<head>
  <title>MVP Calculator</title>

  <style>
    body {
      background: linear-gradient(135deg,#020617,#0f172a);
      color:white;
      font-family:'Segoe UI',sans-serif;
      padding:20px;
    }

    .input-box {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
      background: rgba(255,255,255,0.05);
      padding:15px;
      border-radius:12px;
    }

    input, select {
      padding:10px;
      border-radius:8px;
      border:none;
      background:#0f172a;
      color:white;
    }

    button {
      padding:8px 14px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
    }

    .top {
      color:#22c55e;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>MVP Calculator</h1>

<div class="input-box">
  <select id="player"></select>
  <input id="runs" placeholder="Runs">
  <input id="sr" placeholder="Strike Rate">
  <button onclick="addPlayer()">Add Player</button>
  <button onclick="resetMVP()">Reset</button>
</div>

<div id="mvpList"></div>

<script>

// ✅ PLAYERS
const players = [
  "Shimron Hetmyer","Yashasvi Jaiswal","Vaibhav Sooryavanshi",
  "Manish Pandey","Cameron Green","Finn Allen","Mitchell Marsh",
  "Ayush Badoni","Aiden Markram","Ryan Rickelton","Hardik Pandya",
  "Rohit Sharma","Glenn Phillips","Jos Buttler","Tristan Stubbs",
  "Nitish Rana","KL Rahul","Travis Head","Abhishek Sharma",
  "Ishan Kishan","Shubman Gill","Marco Jansen","Marcus Stoinis",
  "Shreyas Iyer","Rajat Patidar","Phil Salt","MS Dhoni",
  "Virat Kohli","Ruturaj Gaikwad","Sanju Samson","David Miller"
];

const playerSelect = document.getElementById("player");

players.forEach(p=>{
  playerSelect.innerHTML += `<option>${p}</option>`;
});

// ✅ LOAD FROM STORAGE
let data = JSON.parse(localStorage.getItem("mvpData")) || {};

// ✅ POINT SYSTEM
function calculatePoints(runs, sr){
  let points = runs;

  if(sr < 100) points -= 2;
  else if(sr >= 300) points += 5;
  else if(sr >= 200) points += 3;
  else if(sr >= 100) points += 1;

  return points;
}

// ✅ ADD PLAYER
function addPlayer(){
  let name = playerSelect.value;
  let runs = parseInt(document.getElementById("runs").value);
  let sr = parseFloat(document.getElementById("sr").value);

  if(!runs || !sr){
    alert("Enter runs and strike rate");
    return;
  }

  let matchPoints = calculatePoints(runs, sr);

  if(data[name]){
    data[name].matches += 1;
    data[name].runs += runs;
    data[name].totalSR += sr;
    data[name].points += matchPoints;
  } else {
    data[name] = {
      matches: 1,
      runs: runs,
      totalSR: sr,
      points: matchPoints
    };
  }

  saveData();
  render();
}

// ✅ SAVE TO STORAGE
function saveData(){
  localStorage.setItem("mvpData", JSON.stringify(data));
}

// ✅ RENDER
function render(){
  let div = document.getElementById("mvpList");
  div.innerHTML = "";

  let arr = [];

  for(let name in data){
    let p = data[name];
    let avgSR = p.totalSR / p.matches;

    arr.push({
      name,
      matches: p.matches,
      runs: p.runs,
      sr: avgSR.toFixed(1),
      pts: p.points
    });
  }

  arr.sort((a,b)=> b.pts - a.pts);

  arr.forEach((p,i)=>{
    div.innerHTML += `
    <div class="card">
      <div class="${i===0 ? "top" : ""}">
        ${i===0 ? "🏆 " : ""}${p.name}
      </div>
      Matches: ${p.matches} | Runs: ${p.runs}<br>
      Avg SR: ${p.sr}<br>
      Points: ${p.pts}
    </div>`;
  });
}

// ✅ RESET
function resetMVP(){
  data = {};
  localStorage.removeItem("mvpData");
  render();
}

// ✅ LOAD ON PAGE OPEN
render();

</script>

</body>
</html>
