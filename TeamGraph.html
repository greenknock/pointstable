<!DOCTYPE html>
<html>
<head>
  <title>Team Graph</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background: radial-gradient(circle at 20% 20%, #22c55e22, transparent),
                  radial-gradient(circle at 80% 80%, #3b82f622, transparent),
                  #020617;
      color:white;
      display:flex;
      justify-content:center;
      padding:40px 20px;
    }

    .container{
      width:100%;
      max-width:900px;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:32px;
      letter-spacing:1px;
    }

    /* INPUT CARD */
    .input-card{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      border-radius:16px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    textarea{
      width:100%;
      height:90px;
      background:#020617;
      border:none;
      border-radius:10px;
      padding:10px;
      color:white;
      resize:none;
      outline:none;
    }

    .btns{
      margin-top:15px;
      display:flex;
      gap:10px;
    }

    button{
      border:none;
      padding:10px 18px;
      border-radius:10px;
      cursor:pointer;
      font-weight:500;
      transition:0.25s;
    }

    .add{
      background:#22c55e;
    }

    .reset{
      background:#ef4444;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 6px 20px rgba(0,0,0,0.6);
    }

    /* TEAM TABS */
    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .tab{
      padding:8px 14px;
      background:#1e293b;
      border-radius:999px;
      cursor:pointer;
      transition:0.3s;
    }

    .tab.active{
      background:#22c55e;
      transform:scale(1.05);
    }

    .tab:hover{
      transform:scale(1.05);
    }

    /* GRAPH CARD */
    .graph-card{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      padding:25px;
      border-radius:16px;
      box-shadow:0 15px 40px rgba(0,0,0,0.6);
      animation:fadeIn 0.4s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    .empty{
      text-align:center;
      opacity:0.5;
      padding:40px 0;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>📊 Team Performance Graph</h1>

  <div class="input-card">
    <textarea id="matchInput" placeholder='{
  "match": 1,
  "teamA": "RCB",
  "teamB": "MI",
  "teamAPoints": 45,
  "teamBPoints": 30
}'></textarea>

    <div class="btns">
      <button class="add" onclick="addMatch()">Add Match</button>
      <button class="reset" onclick="resetGraph()">Reset</button>
    </div>
  </div>

  <div class="tabs" id="teamTabs"></div>

  <div class="graph-card">
    <canvas id="teamChart"></canvas>
    <div id="emptyState" class="empty">No data yet</div>
  </div>

</div>

<script>

let matches = JSON.parse(localStorage.getItem("teamGraphData")) || [];
let chart = null;
let currentTeam = null;

function addMatch(){
  try{
    let input = JSON.parse(document.getElementById("matchInput").value);
    matches.push(input);

    localStorage.setItem("teamGraphData", JSON.stringify(matches));
    document.getElementById("matchInput").value = "";

    renderTeams();
  }catch{
    alert("Invalid JSON");
  }
}

function resetGraph(){
  matches = [];
  localStorage.removeItem("teamGraphData");
  currentTeam = null;
  renderTeams();
}

function getTeams(){
  let set = new Set();
  matches.forEach(m=>{
    set.add(m.teamA);
    set.add(m.teamB);
  });
  return [...set];
}

function renderTeams(){
  let tabs = document.getElementById("teamTabs");
  tabs.innerHTML = "";

  let teams = getTeams();

  if(!teams.length){
    document.getElementById("emptyState").style.display = "block";
    if(chart) chart.destroy();
    return;
  }

  document.getElementById("emptyState").style.display = "none";

  teams.forEach(team=>{
    let active = team === currentTeam ? "active" : "";

    tabs.innerHTML += `
      <div class="tab ${active}" onclick="showGraph('${team}')">
        ${team}
      </div>
    `;
  });

  if(!currentTeam) showGraph(teams[0]);
}

function showGraph(team){
  currentTeam = team;
  renderTeams();

  let labels = [];
  let dataPoints = [];

  matches.forEach(m=>{
    if(m.teamA === team){
      labels.push("M" + m.match);
      dataPoints.push(m.teamAPoints);
    }
    if(m.teamB === team){
      labels.push("M" + m.match);
      dataPoints.push(m.teamBPoints);
    }
  });

  let ctx = document.getElementById("teamChart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: team,
        data: dataPoints,
        borderWidth:2,
        tension:0.4,
        pointRadius:4
      }]
    },
    options:{
      plugins:{
        legend:{ labels:{ color:"white" } }
      },
      scales:{
        x:{ ticks:{ color:"white" } },
        y:{ ticks:{ color:"white" } }
      }
    }
  });
}

renderTeams();

</script>

</body>
</html>
