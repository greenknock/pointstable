<!DOCTYPE html>
<html>
<head>
  <title>Team Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      margin:0;
      font-family:Segoe UI;
      background: radial-gradient(circle at 20% 20%, #22c55e22, transparent),
                  radial-gradient(circle at 80% 80%, #3b82f622, transparent),
                  #020617;
      color:white;
    }

    /* HEADER */
    .header{
      text-align:center;
      padding:20px;
      font-size:28px;
      font-weight:bold;
    }

    /* TEAM SELECT */
    .team-select{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:20px;
    }

    select{
      padding:10px;
      border-radius:10px;
      border:none;
      background:#1e293b;
      color:white;
      font-size:16px;
    }

    /* GRAPH CARD */
    .graph-card{
      max-width:1000px;
      margin:20px auto;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(10px);
      padding:25px;
      border-radius:16px;
      box-shadow:0 20px 60px rgba(0,0,0,0.7);
      transition:0.3s;
    }

    .graph-card:hover{
      transform:translateY(-5px);
    }

    canvas{
      width:100% !important;
    }

    /* TEAM LABELS */
    .legend{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-bottom:10px;
      font-size:14px;
    }

    .box{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .color{
      width:14px;
      height:14px;
      border-radius:4px;
    }

  </style>
</head>

<body>

<div class="header">📊 Team Comparison Analytics</div>

<div class="team-select">
  <select id="team1"></select>
  <select id="team2"></select>
</div>

<div class="legend">
  <div class="box"><div class="color" style="background:#22c55e"></div> Team 1</div>
  <div class="box"><div class="color" style="background:#3b82f6"></div> Team 2</div>
</div>

<div class="graph-card">
  <canvas id="chart"></canvas>
</div>

<script>

const teams = ["CSK","MI","RCB","SRH","RR","DC","GT","LSG","KKR","PBKS"];

const t1 = document.getElementById("team1");
const t2 = document.getElementById("team2");

teams.forEach(t=>{
  t1.innerHTML += `<option>${t}</option>`;
  t2.innerHTML += `<option>${t}</option>`;
});

let matches = JSON.parse(localStorage.getItem("matches")) || [];
let chart;

// overs → balls
function oversToBalls(o){
  let [a,b]=(o||"").split(".");
  return (parseInt(a)||0)*6 + (parseInt(b)||0);
}

function getBalls(balls, wickets){
  if(wickets === 3) return 60;
  return balls;
}

// get data for team
function getTeamData(team){
  let labels = [];
  let data = [];
  let colors = [];
  let count = 1;

  matches.forEach(m=>{
    let wkA = m.wkA || 0;
    let wkB = m.wkB || 0;

    let ballsA = getBalls(oversToBalls(m.oversA), wkA);
    let ballsB = getBalls(oversToBalls(m.oversB), wkB);

    let nrrA = (m.rA/(ballsA/6)) - (m.rB/(ballsB/6));
    let nrrB = (m.rB/(ballsB/6)) - (m.rA/(ballsA/6));

    if(m.teamA === team){
      labels.push("M"+count);
      data.push(Number(nrrA.toFixed(2)));
      colors.push(m.rA > m.rB ? "green" : "red");
      count++;
    }

    if(m.teamB === team){
      labels.push("M"+count);
      data.push(Number(nrrB.toFixed(2)));
      colors.push(m.rB > m.rA ? "green" : "red");
      count++;
    }
  });

  return {labels,data,colors};
}

// draw graph
function draw(){
  let team1 = t1.value;
  let team2 = t2.value;

  let d1 = getTeamData(team1);
  let d2 = getTeamData(team2);

  let maxLen = Math.max(d1.labels.length, d2.labels.length);
  let labels = [];

  for(let i=1;i<=maxLen;i++){
    labels.push("M"+i);
  }

  let ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {
          label:team1,
          data:d1.data,
          borderColor:"#22c55e",
          tension:0.4,
          pointBackgroundColor:d1.colors,
          pointRadius:6
        },
        {
          label:team2,
          data:d2.data,
          borderColor:"#3b82f6",
          tension:0.4,
          pointBackgroundColor:d2.colors,
          pointRadius:6
        }
      ]
    },
    options:{
      plugins:{
        legend:{labels:{color:"white"}}
      },
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

// trigger
t1.onchange = draw;
t2.onchange = draw;

draw();

</script>

</body>
</html>
