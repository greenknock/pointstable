<!DOCTYPE html>
<html>
<head>
  <title>Team Graph</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Poppins;
    }

    body{
      background:#020617;
      color:white;
    }

    /* NAV BAR */
    .navbar{
      display:flex;
      justify-content:center;
      gap:40px;
      padding:15px;
      background:#000;
      border-bottom:1px solid #222;
    }

    .nav-item{
      cursor:pointer;
      color:#60a5fa;
      font-weight:500;
      transition:0.3s;
    }

    .nav-item:hover{
      color:white;
    }

    .active{
      color:white;
      border-bottom:2px solid #22c55e;
      padding-bottom:5px;
    }

    /* FORM */
    .form-box{
      display:none;
      max-width:500px;
      margin:30px auto;
      background:#1e293b;
      padding:20px;
      border-radius:12px;
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      background:#020617;
      color:white;
    }

    button{
      padding:10px;
      border:none;
      border-radius:8px;
      background:#22c55e;
      cursor:pointer;
    }

    /* GRAPH */
    .graph{
      max-width:800px;
      margin:40px auto;
      background:#1e293b;
      padding:20px;
      border-radius:12px;
    }

  </style>
</head>

<body>

<!-- NAV BAR -->
<div class="navbar" id="navbar"></div>

<!-- FORM -->
<div class="form-box" id="formBox">
  <h3 id="teamTitle"></h3>

  <input id="matchNo" placeholder="Match No">
  <input id="points" placeholder="Team Points">

  <button onclick="addData()">Add Data</button>
</div>

<!-- GRAPH -->
<div class="graph">
  <canvas id="chart"></canvas>
</div>

<script>

const teams = ["RCB","MI","CSK","RR","GT","SRH","PBKS","LSG","KKR","DC"];

let currentTeam = null;
let data = JSON.parse(localStorage.getItem("teamData")) || {};

const navbar = document.getElementById("navbar");

// CREATE NAV
teams.forEach(team=>{
  navbar.innerHTML += `<div class="nav-item" onclick="selectTeam('${team}', this)">${team}</div>`;
});

// SELECT TEAM
function selectTeam(team, el){
  currentTeam = team;

  document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("formBox").style.display = "block";
  document.getElementById("teamTitle").innerText = team + " Data";

  drawGraph();
}

// ADD DATA
function addData(){
  let match = document.getElementById("matchNo").value;
  let pts = document.getElementById("points").value;

  if(!match || !pts) return;

  if(!data[currentTeam]) data[currentTeam] = [];

  data[currentTeam].push({
    match: Number(match),
    points: Number(pts)
  });

  localStorage.setItem("teamData", JSON.stringify(data));

  drawGraph();
}

// GRAPH
let chart;

function drawGraph(){
  if(!currentTeam || !data[currentTeam]) return;

  let sorted = data[currentTeam].sort((a,b)=>a.match-b.match);

  let labels = sorted.map(x=>"M"+x.match);
  let points = sorted.map(x=>x.points);

  let ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:currentTeam,
        data:points,
        tension:0.4
      }]
    },
    options:{
      plugins:{legend:{labels:{color:"white"}}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

</script>

</body>
</html>
