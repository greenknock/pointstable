<!DOCTYPE html>
<html>
<head>
  <title>Team Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      background:#020617;
      color:white;
      font-family:Segoe UI;
      margin:0;
    }

    /* NAVBAR */
    .navbar{
      display:flex;
      justify-content:center;
      gap:30px;
      padding:15px;
      background:#000;
    }

    .nav{
      cursor:pointer;
      color:#60a5fa;
    }

    .nav.active{
      color:white;
      border-bottom:2px solid #22c55e;
    }

    /* GRAPH */
    .graph{
      max-width:900px;
      margin:40px auto;
      background:#1e293b;
      padding:20px;
      border-radius:12px;
    }
  </style>
</head>

<body>

<div class="navbar" id="nav"></div>

<div class="graph">
  <canvas id="chart"></canvas>
</div>

<script>

const teams = ["CSK","MI","RCB","SRH","RR","DC","GT","LSG","KKR","PBKS"];
const nav = document.getElementById("nav");

teams.forEach(t=>{
  nav.innerHTML += `<div class="nav" onclick="selectTeam('${t}',this)">${t}</div>`;
});

let matches = JSON.parse(localStorage.getItem("matches")) || [];
let currentTeam = null;
let chart;

// CONVERT OVERS → BALLS
function oversToBalls(o){
  let [a,b]=(o||"").split(".");
  return (parseInt(a)||0)*6 + (parseInt(b)||0);
}

// CALCULATE BALLS FACED (your rule)
function getBalls(balls, wickets){
  if(wickets === 3) return 60;
  return balls;
}

// SELECT TEAM
function selectTeam(team, el){
  currentTeam = team;

  document.querySelectorAll(".nav").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  drawGraph();
}

// DRAW GRAPH
function drawGraph(){
  if(!currentTeam) return;

  let labels = [];
  let nrrData = [];
  let colors = [];

  matches.forEach((m,i)=>{

    let wkA = m.wkA || 0;
    let wkB = m.wkB || 0;

    let ballsA = getBalls(oversToBalls(m.oversA), wkA);
    let ballsB = getBalls(oversToBalls(m.oversB), wkB);

    let nrrA = (m.rA/(ballsA/6)) - (m.rB/(ballsB/6));
    let nrrB = (m.rB/(ballsB/6)) - (m.rA/(ballsA/6));

    // TEAM A
    if(m.teamA === currentTeam){
      labels.push("M" + (matches.length - i));
      nrrData.push(nrrA.toFixed(2));

      if(m.rA > m.rB) colors.push("green");
      else colors.push("red");
    }

    // TEAM B
    if(m.teamB === currentTeam){
      labels.push("M" + (matches.length - i));
      nrrData.push(nrrB.toFixed(2));

      if(m.rB > m.rA) colors.push("green");
      else colors.push("red");
    }

  });

  let ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label: currentTeam + " NRR",
        data:nrrData,
        borderColor:"#22c55e",
        tension:0.4,
        pointBackgroundColor: colors,
        pointRadius:6
      }]
    },
    options:{
      plugins:{
        legend:{labels:{color:"white"}}
      },
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

</script>

</body>
</html>
