<!DOCTYPE html>
<html>
<head>
  <title>Chase Master Leaderboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
      margin:0;
      font-family:Segoe UI;
      background:#020617;
      color:white;
      text-align:center;
    }

    h1{
      margin:20px;
    }

    .card{
      max-width:900px;
      margin:20px auto;
      padding:20px;
      background:rgba(255,255,255,0.05);
      border-radius:14px;
    }

    canvas{
      width:100% !important;
    }
  </style>
</head>

<body>

<h1>🔥 Chase Master Leaderboard</h1>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>

let matches = JSON.parse(localStorage.getItem("matches")) || [];

let chart;

// overs → balls
function oversToBalls(o){
  let [a,b]=(o||"").split(".");
  return (parseInt(a)||0)*6 + (parseInt(b)||0);
}

function getBalls(balls, wickets){
  if(wickets === 3) return 60;
  return balls;
}

function getChaseLeaderboard(){

  let teams = {};

  matches.forEach(m=>{

    let chasing = m.batFirst === "A" ? m.teamB : m.teamA;
    let defending = m.batFirst === "A" ? m.teamA : m.teamB;

    let winner = m.rA > m.rB ? m.teamA : m.teamB;

    if(winner !== chasing) return;

    if(!teams[chasing]){
      teams[chasing] = {
        wins:0,
        runsFor:0,
        runsAgainst:0,
        ballsFaced:0,
        ballsBowled:0
      };
    }

    let wkA = m.wkA || 0;
    let wkB = m.wkB || 0;

    let bA = getBalls(oversToBalls(m.oversA), wkA);
    let bB = getBalls(oversToBalls(m.oversB), wkB);

    if(chasing === m.teamA){
      teams[chasing].runsFor += m.rA;
      teams[chasing].runsAgainst += m.rB;
      teams[chasing].ballsFaced += bA;
      teams[chasing].ballsBowled += bB;
    } else {
      teams[chasing].runsFor += m.rB;
      teams[chasing].runsAgainst += m.rA;
      teams[chasing].ballsFaced += bB;
      teams[chasing].ballsBowled += bA;
    }

    teams[chasing].wins++;
  });

  let result = Object.keys(teams).map(t=>{
    let x = teams[t];

    let nrr = (x.runsFor/(x.ballsFaced/6)) - (x.runsAgainst/(x.ballsBowled/6));
    let score = (x.wins * 20) + nrr;

    return {team:t, score:score.toFixed(2)};
  });

  return result.sort((a,b)=>b.score-a.score);
}

function draw(){

  let data = getChaseLeaderboard();

  let labels = data.map(x=>x.team);
  let scores = data.map(x=>x.score);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Chase Score",
        data:scores
      }]
    },
    options:{
      plugins:{
        legend:{labels:{color:"white"}}
      },
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

draw();

</script>

</body>
</html>
