<!DOCTYPE html>
<html>
<head>
  <title>MVP List</title>

  <style>
    body {
      background: linear-gradient(135deg,#020617,#0f172a);
      color:white;
      font-family:'Segoe UI',sans-serif;
      padding:20px;
    }

    h1 {
      margin-bottom:20px;
    }

    .input-box {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
      background: rgba(255,255,255,0.05);
      padding:15px;
      border-radius:12px;
    }

    input, select {
      padding:10px;
      border-radius:8px;
      border:none;
      background:#0f172a;
      color:white;
    }

    button {
      padding:8px 14px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .card {
      background:#1e293b;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
    }

    .top {
      color:#22c55e;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>MVP Calculator</h1>

<div class="input-box">
  <select id="player"></select>
  <input id="runs" placeholder="Runs">
  <input id="sr" placeholder="Strike Rate">
  <button onclick="addPlayer()">Add Player</button>
</div>

<div id="mvpList"></div>

<script>

// 🔴 ADD YOUR PLAYERS HERE
const players = [
  "Virat Kohli","Rohit Sharma","MS Dhoni","Sanju Samson",
  "KL Rahul","Shubman Gill","Hardik Pandya","Ruturaj Gaikwad"
];

const playerSelect = document.getElementById("player");

players.forEach(p=>{
  playerSelect.innerHTML += `<option>${p}</option>`;
});

let data = [];

function calculatePoints(runs, sr){
  runs = parseInt(runs) || 0;
  sr = parseFloat(sr) || 0;

  let points = runs;

  if(sr < 100) points -= 2;
  else if(sr >= 300) points += 5;
  else if(sr >= 200) points += 3;
  else if(sr >= 100) points += 1;

  return points;
}

function addPlayer(){
  let name = playerSelect.value;
  let runs = document.getElementById("runs").value;
  let sr = document.getElementById("sr").value;

  if(!runs || !sr){
    alert("Enter runs and strike rate");
    return;
  }

  let pts = calculatePoints(runs, sr);

  data.push({name, runs, sr, pts});
  render();
}

function render(){
  let div = document.getElementById("mvpList");
  div.innerHTML = "";

  data.sort((a,b)=> b.pts - a.pts);

  data.forEach((p,i)=>{
    div.innerHTML += `
    <div class="card">
      <div class="${i===0 ? "top" : ""}">
        ${i===0 ? "🏆 " : ""}${p.name}
      </div>
      Runs: ${p.runs} | SR: ${p.sr}<br>
      Points: ${p.pts}
    </div>`;
  });
}

</script>

</body>
</html>
